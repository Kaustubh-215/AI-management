services:

  backend:
    build: .
    container_name: ai-backend

    env_file:
      - .env

    expose:
      - "8000"

    restart: always

  nginx:
    image: nginx:latest

    container_name: ai-nginx

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - backend

    restart: always
