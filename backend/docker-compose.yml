services:

  mysql:
    image: mysql:8.4

    container_name: ai-mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: RootPassword123!
      MYSQL_DATABASE: ai_image_db
      MYSQL_USER: ai_image_user
      MYSQL_PASSWORD: YourStrongPassword123!

    volumes:
      - mysql_data:/var/lib/mysql

    expose:
      - "3306"

  backend:
    build: .

    container_name: ai-backend

    env_file:
      - .env

    volumes:
      - .:/app

    expose:
      - "8000"

    depends_on:
      - mysql

    restart: always

  nginx:
    image: nginx:latest

    container_name: ai-nginx

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/html:/usr/share/nginx/html:ro

    depends_on:
      - backend

    restart: always

  prometheus:
    image: prom/prometheus:latest

    container_name: ai-prometheus

    ports:
      - "9090:9090"

    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

    restart: always

  grafana:
    image: grafana/grafana:latest

    container_name: ai-grafana

    ports:
      - "3000:3000"

    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning

    restart: always

  loki:
    image: grafana/loki:latest

    container_name: ai-loki

    ports:
      - "3100:3100"

    command:
      - "-config.file=/etc/loki/loki-config.yml"

    volumes:
      - ../monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml

    restart: always

  promtail:
    image: grafana/promtail:latest

    container_name: ai-promtail

    volumes:
      - ../monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock

    command:
      - "-config.file=/etc/promtail/promtail-config.yml"

    depends_on:
      - loki

    restart: always

  tempo:
    image: grafana/tempo:latest

    container_name: ai-tempo

    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"

    command:
      - "-config.file=/etc/tempo/tempo.yml"

    volumes:
      - ../monitoring/tempo/tempo.yml:/etc/tempo/tempo.yml

    restart: always

  node-exporter:
    image: prom/node-exporter:latest

    container_name: ai-node-exporter

    ports:
      - "9100:9100"

    restart: always

volumes:
  mysql_data:
  grafana_data:
