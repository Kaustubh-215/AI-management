services:

  mysql:
    image: mysql:8.4

    container_name: ai-mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: RootPassword123!
      MYSQL_DATABASE: ai_image_db
      MYSQL_USER: ai_image_user
      MYSQL_PASSWORD: YourStrongPassword123!

    volumes:
      - mysql_data:/var/lib/mysql

    expose:
      - "3306"

  backend:
    build: .

    container_name: ai-backend

    env_file:
      - .env

    volumes:
      - .:/app

    expose:
      - "8000"

    depends_on:
      - mysql

    restart: always

  nginx:
    image: nginx:latest

    container_name: ai-nginx

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/html:/usr/share/nginx/html:ro

    depends_on:
      - backend

    restart: always

volumes:
  mysql_data:
